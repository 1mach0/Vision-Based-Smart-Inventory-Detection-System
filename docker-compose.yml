services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vision
      POSTGRES_PASSWORD: vision
      POSTGRES_DB: vision
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://vision:vision@db:5432/vision
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  db_data:
